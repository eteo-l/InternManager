server {
    listen 80;
    listen [::]:80;
    server_name casintern.cn www.casintern.cn;

    root /var/www/intern-manager/frontend/current;

    location /.well-known/acme-challenge/ {
        try_files $uri =404;
    }

    location / {
        return 301 https://www.casintern.cn$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name casintern.cn;

    ssl_certificate /etc/letsencrypt/live/casintern.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casintern.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://www.casintern.cn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.casintern.cn;

    root /var/www/intern-manager/frontend/current;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/casintern.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casintern.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    client_max_body_size 10m;

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
